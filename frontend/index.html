<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>What's Your Personality Type?</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --surface: #16162a;
      --surface2: #1e1e38;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0ff;
      --muted: #8888aa;
      --accent: #7c3aed;
      --accent2: #db2777;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── LANDING ── */
    #screen-landing {
      text-align: center;
      max-width: 560px;
      animation: fadeUp .6s ease both;
    }
    .logo-emoji { font-size: 64px; margin-bottom: 16px; display: block; }
    #screen-landing h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
      margin-bottom: 16px;
    }
    #screen-landing p {
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .btn-primary {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 16px 48px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 0 32px rgba(124,58,237,.4);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 48px rgba(124,58,237,.6); }
    .btn-primary:active { transform: translateY(0); }

    /* ── QUIZ ── */
    #screen-quiz { display: none; width: 100%; max-width: 640px; }

    .progress-wrap {
      margin-bottom: 28px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .progress-bar {
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width .4s cubic-bezier(.4,0,.2,1);
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px 28px;
      animation: fadeUp .35s ease both;
    }
    .question-num {
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .question-text {
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 28px;
    }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option-btn {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 16px 20px;
      text-align: left;
      font-size: 1rem;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .option-btn:hover {
      border-color: rgba(124,58,237,.5);
      background: rgba(124,58,237,.08);
      transform: translateX(4px);
    }
    .option-btn.selected {
      border-color: var(--accent);
      background: rgba(124,58,237,.15);
    }
    .option-letter {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .85rem;
      flex-shrink: 0;
      transition: background .15s;
    }
    .option-btn.selected .option-letter {
      background: var(--accent);
    }

    .quiz-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 24px;
    }
    .btn-next {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .15s;
    }
    .btn-next.visible { opacity: 1; pointer-events: all; }
    .btn-next:hover { transform: translateY(-1px); }

    /* ── RESULT ── */
    #screen-result { display: none; width: 100%; max-width: 580px; animation: fadeUp .6s ease both; }

    .result-card {
      border-radius: var(--radius);
      padding: 40px 32px;
      text-align: center;
      border: 2px solid;
      position: relative;
      overflow: hidden;
    }
    .result-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: .08;
      background: radial-gradient(circle at 50% 0%, currentColor 0%, transparent 70%);
    }
    .result-emoji { font-size: 72px; margin-bottom: 8px; display: block; }
    .result-label {
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      opacity: .7;
      margin-bottom: 6px;
    }
    .result-tag {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 20px;
    }
    .result-desc {
      font-size: 1rem;
      line-height: 1.65;
      opacity: .85;
      margin-bottom: 24px;
    }
    .traits {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .trait-chip {
      padding: 6px 16px;
      border-radius: 99px;
      font-size: .85rem;
      font-weight: 600;
      border: 1px solid currentColor;
      opacity: .8;
    }
    .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 50px;
      padding: 12px 28px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-secondary:hover { background: var(--surface); }

    /* ── CONTACT ── */
    #screen-contact {
      display: none;
      width: 100%;
      max-width: 520px;
      animation: fadeUp .4s ease both;
    }
    #screen-contact h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
    #screen-contact p { color: var(--muted); margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 6px; color: var(--muted); }
    .form-group input, .form-group textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 12px 16px;
      font-size: 1rem;
      outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .form-status { font-size: .9rem; margin-top: 10px; min-height: 20px; }
    .form-status.success { color: #34d399; }
    .form-status.error   { color: #f87171; }

    /* ── UTILS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- LANDING -->
  <section id="screen-landing">
    <span class="logo-emoji">🧠</span>
    <h1>What's Your Personality Type?</h1>
    <p>10 questions. No fluff. Discover which of 8 personality archetypes matches who you really are.</p>
    <button class="btn-primary" id="btnStart">Take the Quiz →</button>
  </section>

  <!-- QUIZ -->
  <section id="screen-quiz">
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressText">Question 1 of 10</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card" id="questionCard">
      <div class="question-num" id="questionNum">Question 1</div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
    </div>

    <div class="quiz-footer">
      <button class="btn-next" id="btnNext">Next →</button>
    </div>
  </section>

  <!-- RESULT -->
  <section id="screen-result">
    <div class="result-card" id="resultCard">
      <span class="result-emoji" id="resultEmoji"></span>
      <div class="result-label">Your personality type</div>
      <div class="result-tag" id="resultTag"></div>
      <p class="result-desc" id="resultDesc"></p>
      <div class="traits" id="resultTraits"></div>
      <div class="result-actions">
        <button class="btn-secondary" id="btnRetake">↩ Retake Quiz</button>
        <button class="btn-primary" id="btnContact" style="padding:12px 28px;font-size:.95rem;">Leave a Message</button>
      </div>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="screen-contact">
    <h2>Leave a Message</h2>
    <p>Tell us what you think — or just say hi.</p>
    <form id="contactForm">
      <div class="form-group">
        <label for="cName">Name</label>
        <input type="text" id="cName" placeholder="Your name" required />
      </div>
      <div class="form-group">
        <label for="cEmail">Email</label>
        <input type="email" id="cEmail" placeholder="your@email.com" required />
      </div>
      <div class="form-group">
        <label for="cMessage">Message</label>
        <textarea id="cMessage" placeholder="Write something..." required></textarea>
      </div>
      <button type="submit" class="btn-primary" id="btnSend" style="width:100%;padding:14px;">Send Message</button>
      <div class="form-status" id="formStatus"></div>
    </form>
    <div style="margin-top:20px;text-align:center;">
      <button class="btn-secondary" id="btnBackToResult">← Back to my result</button>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
